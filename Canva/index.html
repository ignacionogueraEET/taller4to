<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Juego Canvas</title>
    <style>
      body {
        text-align: center;
        font-family: Arial;
      }
      canvas {
        background: #f0f0f0;
        border: 2px solid black;
      }
    </style>
  </head>
  <body>
    <h2>Atrapar el Cuadrado</h2>
    <p>Puntaje: <span id="score">0</span></p>
    <canvas id="game" width="500" height="400">
      <p>Su navegador no soporta canvas :(</p>
    </canvas>

    <script>
      const canvas = document.getElementById('game');
      const ctx = canvas.getContext('2d');

      let score = 0;

      // Jugador
      let playerWidth = 100;
      let playerHeight = 15;
      let playerX = 200;
      let playerY = 370;
      let speed = 7;

      // Objeto que cae
      let boxSize = 20;
      let boxX = Math.random() * (canvas.width - boxSize);
      let boxY = 0;
      let boxSpeed = 3;

      // Controles
      let rightPressed = false;
      let leftPressed = false;

      // Escuchar eventos de teclado cuando se presionan las flechas
      document.addEventListener('keydown', (e) => {
        if (e.key === 'ArrowRight') rightPressed = true;
        if (e.key === 'ArrowLeft') leftPressed = true;
      });

      // Escuchar eventos de teclado cuando se sueltan las flechas
      document.addEventListener('keyup', (e) => {
        if (e.key === 'ArrowRight') rightPressed = false;
        if (e.key === 'ArrowLeft') leftPressed = false;
      });

      // Dibujar jugador
      function drawPlayer() {
        ctx.fillStyle = 'blue';
        ctx.fillRect(playerX, playerY, playerWidth, playerHeight);
      }

      // Dibujar caja
      function drawBox() {
        ctx.fillStyle = 'red';
        ctx.fillRect(boxX, boxY, boxSize, boxSize);
      }

      // 
      function update() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Movimiento jugador
        if (rightPressed && playerX < canvas.width - playerWidth) {
          playerX += speed;
        }
        if (leftPressed && playerX > 0) {
          playerX -= speed;
        }

        // Movimiento caja
        boxY += boxSpeed;

        // Colisión
        if (
          boxY + boxSize >= playerY &&
          boxX + boxSize >= playerX &&
          boxX <= playerX + playerWidth
        ) {
          score++;
          document.getElementById('score').textContent = score;
          resetBox();
        }

        // Si se cae
        if (boxY > canvas.height) {
          score--;
          document.getElementById('score').textContent = score;
          resetBox();
        }

        drawPlayer();
        drawBox();

        requestAnimationFrame(update);
      }

      function resetBox() {
        boxY = 0;
        boxX = Math.random() * (canvas.width - boxSize);
      }

      update();
    </script>
  </body>
</html>
